services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tasks_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tls-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: ../../
      dockerfile: services/auth/Dockerfile
    container_name: auth-service
    environment:
      - AUTH_HTTP_PORT=8081
      - AUTH_GRPC_PORT=50051
      - APP_ENV=production
      - LOG_LEVEL=info
    ports:
      - "8081:8081"
      - "50051:50051"
    networks:
      - tls-network
    # Healthcheck убран

  tasks:
    build:
      context: ../../
      dockerfile: services/tasks/Dockerfile
    container_name: tasks-service
    environment:
      - TASKS_PORT=8082
      - AUTH_GRPC_ADDR=auth:50051
      - DB_URL=postgres://postgres:postgres@postgres:5432/tasks_db?sslmode=disable
      - APP_ENV=production
      - LOG_LEVEL=info
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tls-network
    # Healthcheck убран

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "8443:8443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./key.pem:/etc/nginx/tls/key.pem:ro
    depends_on:
      - tasks
      - auth
    networks:
      - tls-network

networks:
  tls-network:
    driver: bridge

volumes:
  postgres_data: